global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-app
    static_configs:
      - targets:
          - 91.100.1.101:9100

  - job_name: ruby-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - 91.100.1.101:8080
