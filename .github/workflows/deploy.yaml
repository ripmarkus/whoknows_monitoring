name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy monitoring stack
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2806 \
            "${{ secrets.MONITORING_SERVER_USER }}@${{ secrets.MONITORING_SERVER_IP }}" <<'EOF'
          set -eux
          cd /opt/docker/devops/whoknows_monitoring
          git pull
          docker compose pull
          docker compose up -d
          sleep 2
          curl -fsS -X POST http://127.0.0.1:9090/-/reload
          EOF

  deploy-exporters:
    runs-on: ubuntu-latest
    needs: deploy-monitoring
    steps:
      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy node_exporter on app server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.APP_SERVER_USER }}@${{ secrets.APP_SERVER_IP }}" <<'EOF'
          set -eux
          cd /opt/docker/devops/whoknows_monitoring/exporters
          git pull
          docker compose -f compose.exporters.yaml pull
          docker compose -f compose.exporters.yaml up -d
          EOF
